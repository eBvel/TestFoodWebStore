name: Run tests

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: Choose target
        required: true
        default: Chrome_all_tests
        type: choice
        options:
          - Chrome_all_tests
          - Firefox_all_tests
          - Chrome_smoke_tests
          - Firefox_smoke_tests

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Chrome
        if: "github.event.inputs.deployment_target == 'Chrome_all_tests' || github.event.inputs.deployment_target == 'Chrome_smoke_tests'"
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 147
          install-chromedriver: true
      - name: Run all tests to Chrome
        if: "github.event.inputs.deployment_target == 'Chrome_all_tests'"
        run: > 
          USER1_LOGIN=${{ secrets.USER1_LOGIN }} USER1_PASSWORD=${{ secrets.USER1_PASSWORD }}
          USER2_LOGIN=${{ secrets.USER2_LOGIN }} USER2_PASSWORD=${{ secrets.USER2_PASSWORD }}
          USER3_LOGIN=${{ secrets.USER3_LOGIN }} USER3_PASSWORD=${{ secrets.USER3_PASSWORD }}
          USER4_LOGIN=${{ secrets.USER4_LOGIN }} USER4_PASSWORD=${{ secrets.USER4_PASSWORD }}
          ADMIN_LOGIN=${{ secrets.ADMIN_LOGIN }} ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          pytest --headless --alluredir=allure-results
        continue-on-error: true
      - name: Run smoke tests to Chrome
        if: "github.event.inputs.deployment_target == 'Chrome_smoke_tests'"
        run: > 
          USER1_LOGIN=${{ secrets.USER1_LOGIN }} USER1_PASSWORD=${{ secrets.USER1_PASSWORD }}
          USER2_LOGIN=${{ secrets.USER2_LOGIN }} USER2_PASSWORD=${{ secrets.USER2_PASSWORD }}
          USER3_LOGIN=${{ secrets.USER3_LOGIN }} USER3_PASSWORD=${{ secrets.USER3_PASSWORD }}
          USER4_LOGIN=${{ secrets.USER4_LOGIN }} USER4_PASSWORD=${{ secrets.USER4_PASSWORD }}
          ADMIN_LOGIN=${{ secrets.ADMIN_LOGIN }} ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          pytest -m smoke --headless --alluredir=allure-results
        continue-on-error: true

      - name: Setup Firefox
        if: "github.event.inputs.deployment_target == 'Firefox_all_tests' || github.event.inputs.deployment_target == 'Firefox_smoke_tests'"
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 150.0.1
      - name: Run all tests to Firefox
        if: "github.event.inputs.deployment_target == 'Firefox_all_tests'"
        run: > 
          USER1_LOGIN=${{ secrets.USER1_LOGIN }} USER1_PASSWORD=${{ secrets.USER1_PASSWORD }}
          USER2_LOGIN=${{ secrets.USER2_LOGIN }} USER2_PASSWORD=${{ secrets.USER2_PASSWORD }}
          USER3_LOGIN=${{ secrets.USER3_LOGIN }} USER3_PASSWORD=${{ secrets.USER3_PASSWORD }}
          USER4_LOGIN=${{ secrets.USER4_LOGIN }} USER4_PASSWORD=${{ secrets.USER4_PASSWORD }}
          ADMIN_LOGIN=${{ secrets.ADMIN_LOGIN }} ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          pytest --headless --browser=firefox --alluredir=allure-results
        continue-on-error: true
      - name: Run smoke tests to Firefox
        if: "github.event.inputs.deployment_target == 'Firefox_smoke_tests'"
        run: > 
          USER1_LOGIN=${{ secrets.USER1_LOGIN }} USER1_PASSWORD=${{ secrets.USER1_PASSWORD }}
          USER2_LOGIN=${{ secrets.USER2_LOGIN }} USER2_PASSWORD=${{ secrets.USER2_PASSWORD }}
          USER3_LOGIN=${{ secrets.USER3_LOGIN }} USER3_PASSWORD=${{ secrets.USER3_PASSWORD }}
          USER4_LOGIN=${{ secrets.USER4_LOGIN }} USER4_PASSWORD=${{ secrets.USER4_PASSWORD }}
          ADMIN_LOGIN=${{ secrets.ADMIN_LOGIN }} ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          pytest -m smoke --headless --browser=firefox --alluredir=allure-results
        continue-on-error: true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        id: upload-artifact
        with:
          name: allure-results
          path: allure-results
          retention-days: 1
      - name: Save artifact id
        run: ARTIFACT_ID=${{ steps.upload-artifact.outputs.artifact-id }}


  generate-allure-report:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      - name: Install java
        uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
      - name: Install allure-framework
        run: sudo wget https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.tgz && sudo tar -zxvf allure-2.36.0.tgz -C /opt/ && sudo ln -s /opt/allure-2.36.0/bin/allure /usr/bin/allure
      - name: Download workflow artifacts
        uses: actions/download-artifact@v7
        with:
          name: allure-results
          path: allure-results
      - run: allure generate -c allure-results -o _site
      - name: Store generated report
        uses: actions/upload-artifact@v7
        with:
          name: _site
          path: _site
          retention-days: 1

  publish-allure-report:
    runs-on: ubuntu-latest
    needs: generate-allure-report
    name: Report publication
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v7
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4